<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <i class="fab fa-github"></i>
            <h1>GitHub Profile Finder</h1>
            <p>Search any GitHub user instantly</p>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter GitHub username..." />
            <button onclick="searchUser()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>

        <!-- Error Message -->
        <div class="error" id="error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorMsg">User not found!</span>
        </div>

        <!-- Profile Card -->
        <div class="profile-card" id="profileCard">
            <div class="profile-top">
                <img id="avatar" src="" alt="Avatar"/>
                <div class="profile-info">
                    <h2 id="name"></h2>
                    <p class="username"><i class="fab fa-github"></i> <span id="login"></span></p>
                    <p class="bio" id="bio"></p>
                    <a id="profileLink" href="" target="_blank">
                        <i class="fas fa-external-link-alt"></i> View on GitHub
                    </a>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <i class="fas fa-users"></i>
                    <span id="followers"></span>
                    <p>Followers</p>
                </div>
                <div class="stat">
                    <i class="fas fa-user-plus"></i>
                    <span id="following"></span>
                    <p>Following</p>
                </div>
                <div class="stat">
                    <i class="fas fa-book"></i>
                    <span id="repos"></span>
                    <p>Repos</p>
                </div>
            </div>

            <!-- Extra Info -->
            <div class="extra-info">
                <p id="location"></p>
                <p id="company"></p>
                <p id="blog"></p>
                <p id="joined"></p>
            </div>

            <!-- Repositories -->
            <div class="repos-section">
                <h3><i class="fas fa-book-open"></i> Top Repositories</h3>
                <div class="repos-grid" id="reposList"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
